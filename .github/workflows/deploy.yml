name: Deploy Astro site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; do not cancel an in-progress run so
# live deploys finish cleanly.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      # Derive the site URL and base path from the repo itself, so renaming the
      # repo or transferring it to another account needs no code change.
      #   • repo "<owner>.github.io" → served at the root       → BASE_PATH="/"
      #   • any other repo "<name>"  → served under /<name>/     → BASE_PATH="/<name>"
      - name: Resolve Pages URL layout
        id: urls
        run: |
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY##*/}"
          owner_lc="$(echo "$owner" | tr '[:upper:]' '[:lower:]')"
          if [ "$repo" = "${owner_lc}.github.io" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$repo" >> "$GITHUB_OUTPUT"
          fi
          echo "site=https://${owner_lc}.github.io" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.urls.outputs.base }}
          SITE_URL: ${{ steps.urls.outputs.site }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
